server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode: unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets for 1 year
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
